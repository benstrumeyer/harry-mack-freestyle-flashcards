services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: harrymack
      POSTGRES_USER: ${DB_USER:-harrymack}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U harrymack"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "5000:8080"
    environment:
      ConnectionStrings__Default: "Host=db;Database=harrymack;Username=${DB_USER:-harrymack};Password=${DB_PASSWORD:-dev}"
      PIPELINE_PATH: /app/pipeline
    volumes:
      - ./pipeline:/app/pipeline
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    volumes:
      - ./frontend/src:/app/src
    depends_on:
      - backend

volumes:
  pgdata:
